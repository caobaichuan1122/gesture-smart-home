# Apply with: kubectl apply -f k8s/secret.yaml
# Values must be base64-encoded: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: gesture-smart-home
type: Opaque
data:
  SECRET_KEY: <base64-encoded-django-secret-key>
  DB_PASSWORD: <base64-encoded-db-password>
  SENTRY_DSN: <base64-encoded-sentry-dsn>
