<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gesture Smart Home{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; border-bottom: none; font-weight: 600; }
    .badge-on  { background: #198754; }
    .badge-off { background: #6c757d; }
    .device-btn { min-width: 80px; }
    .stream-img { width: 100%; border-radius: 8px; background: #1a1a2e; min-height: 180px; object-fit: cover; }
    .log-row-fail { background: #fff5f5; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body x-data>

{% if request.user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
      <i class="bi bi-camera-video-fill me-2"></i>Gesture Smart Home
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'gesture_logs' %}active{% endif %}"
             href="{% url 'gesture_logs' %}"><i class="bi bi-list-check me-1"></i>Gesture Logs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/api/docs/" target="_blank"><i class="bi bi-book me-1"></i>API Docs</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <span class="navbar-text me-3"><i class="bi bi-person-fill me-1"></i>{{ request.user.username }}</span>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script>
  // JWT stored in localStorage; used by Alpine.js components for API calls
  const AUTH = {
    get token() { return localStorage.getItem('jwt_access') || ''; },
    set token(v) { localStorage.setItem('jwt_access', v); },
    headers() { return this.token ? { 'Authorization': 'Bearer ' + this.token } : {}; },
    async json(url, opts = {}) {
      opts.headers = { ...this.headers(), 'Content-Type': 'application/json', ...(opts.headers || {}) };
      const r = await fetch(url, opts);
      if (r.status === 401) { window.location = '/'; return null; }
      return r.ok ? r.json() : null;
    },
  };
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
