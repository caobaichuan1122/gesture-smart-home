{% extends 'base.html' %}
{% block title %}Login – Gesture Smart Home{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-camera-video-fill fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">Gesture Smart Home</h4>
        <p class="text-muted small">Sign in to continue</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      <form method="post" id="loginForm">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // After session login succeeds Django redirects to /dashboard/.
  // Simultaneously acquire a JWT token so the Alpine.js components can call the API.
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    const username = this.querySelector('[name=username]').value;
    const password = this.querySelector('[name=password]').value;
    try {
      const r = await fetch('/api/v1/auth/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (r.ok) {
        const data = await r.json();
        localStorage.setItem('jwt_access', data.access);
        localStorage.setItem('jwt_refresh', data.refresh);
      }
    } catch (_) {}
    // Let the form submit normally so Django session auth runs
  });
</script>
{% endblock %}
